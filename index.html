<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Void — Finanzas</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Void"/>
<meta name="theme-color" content="#080808"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080808;--card:#141414;--card2:#1C1C1C;
  --ink:#FFFFFF;--muted:rgba(255,255,255,.38);--border:rgba(255,255,255,.07);
  --red:#FF5A5A;--green:#00C48C;--amber:#FFB020;--blue:#4D9EFF;--purple:#C084FC;
  --red-bg:rgba(255,90,90,.1);--green-bg:rgba(0,196,140,.1);
  --amber-bg:rgba(255,176,32,.1);--blue-bg:rgba(77,158,255,.1);
  --serif:'Newsreader',Georgia,serif;
  --sans:'Hanken Grotesk','Helvetica Neue',sans-serif;
  --mono:'JetBrains Mono','SF Mono',monospace;
}
html{background:var(--bg);}
body{
  background:var(--bg);font-family:var(--sans);color:var(--ink);
  /* FIX safe area iPhone - padding fijo generoso */
  padding-top:max(env(safe-area-inset-top),50px);
  padding-bottom:max(env(safe-area-inset-bottom),20px);
}
button{cursor:pointer;font-family:var(--sans);}
input,select{font-family:var(--sans);outline:none;}
input:focus{border-color:rgba(255,255,255,.3)!important;box-shadow:0 0 0 3px rgba(255,255,255,.05)!important;}
::placeholder{color:rgba(255,255,255,.2);}
::-webkit-scrollbar{height:2px;width:2px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:9999px;}
/* TABS */
.tab{border:none;background:transparent;font-weight:600;font-size:11px;color:var(--muted);padding:10px 10px;border-bottom:1.5px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;white-space:nowrap;letter-spacing:.02em;}
.tab.on{color:var(--ink);border-color:var(--ink);}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:16px;}
/* PILL */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
/* INPUTS */
.inp{border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:14px;color:var(--ink);background:rgba(255,255,255,.04);width:100%;}
/* BUTTONS */
.btn-w{border:none;background:var(--ink);color:#000;font-weight:700;font-size:14px;padding:13px 0;border-radius:10px;width:100%;transition:opacity .15s,transform .1s;}
.btn-w:active{transform:scale(.98);opacity:.85;}
.btn-g{border:1px solid var(--border);background:transparent;font-weight:600;font-size:12px;padding:9px 0;border-radius:9px;color:var(--muted);transition:all .15s;}
.btn-g.on{background:rgba(255,255,255,.1);color:var(--ink);border-color:rgba(255,255,255,.2);}
/* ROW */
.row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 15px;margin-bottom:8px;transition:background .15s;}
.row:hover{background:var(--card2);}
.del{border:none;background:transparent;color:rgba(255,255,255,.2);font-size:20px;line-height:1;flex-shrink:0;padding:0 2px;transition:color .15s;}
.del:hover{color:var(--red);}
/* MES HEAD */
.mh{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:baseline;margin:18px 2px 8px;}
/* STAT */
.sb{border-top:1px solid var(--border);padding:10px 0;}
.sl{font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.sv{font-family:var(--mono);font-size:16px;letter-spacing:-.01em;line-height:1;}
/* CHECKBOX */
.chk{width:20px;height:20px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;}
/* ADD BTN */
.add-btn{border:1px dashed rgba(255,255,255,.15);background:transparent;border-radius:14px;padding:14px;font-size:13px;font-weight:600;color:var(--muted);width:100%;transition:all .2s;}
.add-btn:hover{border-color:rgba(255,255,255,.3);color:var(--ink);}
/* DIVIDER */
.divider{width:1px;height:28px;background:var(--border);flex-shrink:0;}
/* CANCEL BTN */
.btn-cancel{border:1px solid var(--border);background:transparent;border-radius:10px;font-size:14px;font-weight:600;color:var(--muted);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;
const IVA=0.19;
const CLP=n=>new Intl.NumberFormat("es-CL",{style:"currency",currency:"CLP",maximumFractionDigits:0}).format(Math.round(n||0));
const uid=()=>Math.random().toString(36).slice(2,9);
const hoy=()=>{const n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate());};
const todayISO=()=>{const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`;};
const parseLocal=iso=>{const[y,m,d]=iso.split("-").map(Number);return new Date(y,m-1,d);};
const diasHasta=d=>{const t=new Date(d.getFullYear(),d.getMonth(),d.getDate());return Math.round((t-hoy())/86400000);};
const addDays=(iso,n)=>{const[y,m,d]=iso.split("-").map(Number);return new Date(y,m-1,d+n);};
const fmtDate=d=>d.toLocaleDateString("es-CL",{day:"numeric",month:"short"});
const monthKey=d=>(d||"").slice(0,7);
const MESES=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const mesLabel=k=>{const[y,m]=k.split("-");return`${MESES[+m-1]} ${y}`;};
const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
const f29Vence=k=>{let[y,m]=k.split("-").map(Number);m++;if(m>12){m=1;y++;}return new Date(y,m-1,20);};

const D_FAC=[
  {id:"f1",fecha:"2026-05-20",cliente:"Jean Hendrix",numero:"",neto:400000,iva:76000,bruto:476000},
  {id:"f2",fecha:"2026-05-20",cliente:"Banco Bice",numero:"",neto:350000,iva:66500,bruto:416500},
  {id:"f3",fecha:"2026-06-13",cliente:"Jean Hendrix — Mapping",numero:"",neto:1600000,iva:304000,bruto:1904000},
];
const D_COM=[{id:"cp1",fecha:"2026-06-13",proveedor:"Proveedor Proyectores",numero:"",neto:900000,iva:171000,bruto:1071000}];
const D_COB=[
  {id:"co1",fecha:"2026-05-22",monto:238000,tipo:"Anticipo 50%",ref:"Jean Hendrix"},
  {id:"co2",fecha:"2026-05-22",monto:208250,tipo:"Anticipo 50%",ref:"Banco Bice"},
  {id:"co3",fecha:"2026-06-13",monto:952000,tipo:"Anticipo 50%",ref:"Jean Hendrix — Mapping"},
];
const D_META={"2026-05":{ivaPagado:true,montoPagado:114000}};
const D_GF=[
  {id:"gf1",nombre:"Celular Entel",monto:163000,dia:1,freq:"mensual",nota:"Quedan 2 meses",deuda:false},
  {id:"gf2",nombre:"Creative Cloud",monto:55000,dia:5,freq:"mensual",nota:"",deuda:false},
  {id:"gf3",nombre:"Starlink",monto:35000,dia:23,freq:"mensual",nota:"",deuda:false},
  {id:"gf4",nombre:"Cta. Cte. Santander",monto:40000,dia:27,freq:"mensual",nota:"",deuda:false},
  {id:"gf5",nombre:"Emprende (oficina virtual)",monto:60000,dia:null,freq:"semestral",nota:"Cada 6 meses",deuda:true},
];

function sg(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch{return fb;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

const TONE={
  green:{bg:"var(--green-bg)",c:"var(--green)"},
  red:{bg:"var(--red-bg)",c:"var(--red)"},
  amber:{bg:"var(--amber-bg)",c:"var(--amber)"},
  blue:{bg:"var(--blue-bg)",c:"var(--blue)"},
  purple:{bg:"rgba(192,132,252,.1)",c:"var(--purple)"},
  gray:{bg:"rgba(255,255,255,.05)",c:"var(--muted)"},
};
function Pill({tone="gray",children}){const t=TONE[tone];return <span className="pill" style={{background:t.bg,color:t.c}}>{children}</span>;}
function Stat({label,value,color,note}){return <div className="sb"><div className="sl">{label}</div><div className="sv" style={{color:color||"var(--ink)"}}>{value}</div>{note&&<div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>{note}</div>}</div>;}

function App(){
  const[tab,setTab]=useState("gastos");
  const[fac,setFac]=useState(()=>sg("vd:fac",D_FAC));
  const[com,setCom]=useState(()=>sg("vd:com",D_COM));
  const[cob,setCob]=useState(()=>sg("vd:cob",D_COB));
  const[meta,setMeta]=useState(()=>sg("vd:meta",D_META));
  const[gf,setGf]=useState(()=>sg("vd:gf",D_GF));
  const[gfm,setGfm]=useState(()=>sg("vd:gfm",{}));
  useEffect(()=>{ss("vd:fac",fac);},[fac]);
  useEffect(()=>{ss("vd:com",com);},[com]);
  useEffect(()=>{ss("vd:cob",cob);},[cob]);
  useEffect(()=>{ss("vd:meta",meta);},[meta]);
  useEffect(()=>{ss("vd:gf",gf);},[gf]);
  useEffect(()=>{ss("vd:gfm",gfm);},[gfm]);

  const meses=useMemo(()=>{const s=new Set([...fac,...com,...cob].map(x=>monthKey(x.fecha)).filter(Boolean));return[...s].sort().reverse();},[fac,com,cob]);
  const ivaD=k=>fac.filter(f=>monthKey(f.fecha)===k).reduce((s,f)=>s+f.iva,0);
  const ivaC=k=>com.filter(c=>monthKey(c.fecha)===k).reduce((s,c)=>s+c.iva,0);
  const ivaN=k=>Math.max(0,ivaD(k)-ivaC(k));
  const totFac=k=>fac.filter(f=>monthKey(f.fecha)===k).reduce((s,f)=>s+f.bruto,0);
  const setMes=(k,p)=>setMeta(m=>({...m,[k]:{...(m[k]||{}),...p}}));
  const ivaPend=meses.filter(k=>ivaN(k)>0&&!meta[k]?.ivaPagado).reduce((s,k)=>s+ivaN(k),0);
  const proxV=useMemo(()=>{const p=meses.filter(k=>ivaN(k)>0&&!meta[k]?.ivaPagado).sort();if(!p.length)return null;const k=p[0];const d=f29Vence(k);return{key:k,fecha:d,dias:diasHasta(d),monto:ivaN(k)};},[meses,meta,fac,com]);
  const setGfPago=(id,mes,val)=>setGfm(m=>({...m,[mes]:{...(m[mes]||{}),[id]:val}}));
  const anticJun=cob.find(c=>c.id==="co3")?.monto||0;
  const provJun=(com.find(c=>c.id==="cp1")?.bruto||0)/2;
  const ivaJun=ivaN("2026-06");
  const libreJun=anticJun-provJun-ivaJun;
  const now=new Date();
  const TABS=[["gastos","Gastos fijos"],["dash","Dashboard"],["fac","Facturas"],["cal","Cobros"],["ent","Entradas"],["com","Compras"]];

  return <div style={{background:"var(--bg)",minHeight:"100vh"}}>
    <div style={{maxWidth:700,margin:"0 auto",padding:"0 16px"}}>
      <header style={{paddingBottom:0}}>
        {/* Logo mark */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{width:28,height:28,borderRadius:7,background:"var(--ink)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontFamily:"var(--serif)",fontSize:16,fontStyle:"italic",color:"#000",fontWeight:300,lineHeight:1}}>V</span>
              </div>
              <div style={{fontFamily:"var(--mono)",fontSize:9,letterSpacing:".12em",textTransform:"uppercase",color:"var(--muted)"}}>Void Producciones · 77.417.402-8</div>
            </div>
            <h1 style={{fontFamily:"var(--serif)",fontSize:28,fontWeight:300,fontStyle:"italic",color:"var(--ink)",letterSpacing:"-.03em",lineHeight:1}}>Mis finanzas</h1>
          </div>
          <div style={{textAlign:"right",paddingTop:2}}>
            <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)"}}>{now.toLocaleDateString("es-CL",{day:"numeric",month:"short",year:"numeric"})}</div>
            {proxV&&<div style={{marginTop:6}}>
              {proxV.dias<0?<Pill tone="red">F29 vencido</Pill>:proxV.dias<=7?<Pill tone="amber">F29 {proxV.dias}d</Pill>:<Pill tone="blue">F29 {proxV.dias}d</Pill>}
            </div>}
          </div>
        </div>
        <nav style={{display:"flex",borderBottom:"1px solid var(--border)",overflowX:"auto",gap:0}}>
          {TABS.map(([id,l])=><button key={id} className={`tab${tab===id?" on":""}`} onClick={()=>setTab(id)}>{l}</button>)}
        </nav>
      </header>
      <main style={{paddingTop:20,paddingBottom:60}}>
        {tab==="gastos"&&<GastosFijos gf={gf} setGf={setGf} gfm={gfm} setGfPago={setGfPago}/>}
        {tab==="dash"&&<Dashboard meses={meses} ivaD={ivaD} ivaC={ivaC} ivaN={ivaN} totFac={totFac} meta={meta} setMes={setMes} proxV={proxV} ivaPend={ivaPend} anticJun={anticJun} provJun={provJun} ivaJun={ivaJun} libreJun={libreJun}/>}
        {tab==="fac"&&<Facturas fac={fac} setFac={setFac}/>}
        {tab==="cal"&&<Calendario fac={fac} cob={cob}/>}
        {tab==="ent"&&<Entradas cob={cob} setCob={setCob}/>}
        {tab==="com"&&<Compras com={com} setCom={setCom}/>}
      </main>
    </div>
  </div>;
}

/* ══ HERO IVA CARD ══ */
function HeroIva({ivaPend,meses,ivaN,meta,proxV}){
  return <div style={{background:"linear-gradient(135deg,#0F0F0F 0%,#1A1A1A 100%)",border:"1px solid var(--border)",borderRadius:22,padding:24,position:"relative",overflow:"hidden"}}>
    {/* bg glow */}
    <div style={{position:"absolute",top:-40,right:-40,width:180,height:180,borderRadius:"50%",background:ivaPend>0?"rgba(255,90,90,.06)":"rgba(0,196,140,.06)",filter:"blur(40px)",pointerEvents:"none"}}/>
    <div style={{fontFamily:"var(--mono)",fontSize:9,letterSpacing:".12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:12}}>IVA total por pagar</div>
    <div style={{fontFamily:"var(--serif)",fontSize:42,fontStyle:"italic",fontWeight:300,color:ivaPend>0?"var(--red)":"var(--green)",letterSpacing:"-.03em",lineHeight:1,marginBottom:10}}>{CLP(ivaPend)}</div>
    <div style={{fontSize:11,color:"var(--muted)",lineHeight:1.5}}>
      {ivaPend>0?`Pendiente: ${meses.filter(k=>ivaN(k)>0&&!meta[k]?.ivaPagado).map(k=>mesLabel(k)).join(", ")}`:"Todo al día ✓"}
    </div>
  </div>;
}

/* ══ GASTOS FIJOS ══ */
function GastosFijos({gf,setGf,gfm,setGfPago}){
  const[sf,setSf]=useState(false);
  const[nombre,setNombre]=useState("");const[monto,setMonto]=useState("");
  const[dia,setDia]=useState("");const[freq,setFreq]=useState("mensual");
  const[nota,setNota]=useState("");const[deuda,setDeuda]=useState(false);
  const n=new Date();
  const mes=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;
  const mm=gfm[mes]||{};
  const add=()=>{
    const v=Number(String(monto).replace(/[^\d]/g,""));
    if(!v||!nombre.trim())return;
    setGf(a=>[...a,{id:uid(),nombre:nombre.trim(),monto:v,dia:dia?Number(dia):null,freq,nota:nota.trim(),deuda}]);
    setNombre("");setMonto("");setDia("");setNota("");setDeuda(false);setSf(false);
  };
  const del=id=>{if(window.confirm("¿Eliminar?"))setGf(a=>a.filter(g=>g.id!==id));};
  const ce=gf.map(g=>{
    const pagado=!!mm[g.id];let urgente=false,vencida=false;
    if(g.dia){const[y,m2]=mes.split("-").map(Number);const vd=new Date(y,m2-1,g.dia);const d=diasHasta(vd);urgente=d>=0&&d<=5&&!pagado;vencida=d<0&&!pagado;}
    return{...g,pagado,urgente,vencida};
  });
  const total=gf.reduce((s,g)=>s+g.monto,0);
  const pag=ce.filter(g=>g.pagado).reduce((s,g)=>s+g.monto,0);
  const pct=total>0?Math.round(pag/total*100):0;

  return <div style={{display:"grid",gap:10}}>
    {/* Resumen hero */}
    <div style={{background:"linear-gradient(135deg,#0F0F0F,#1A1A1A)",border:"1px solid var(--border)",borderRadius:20,padding:22,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-30,right:-30,width:140,height:140,borderRadius:"50%",background:"rgba(192,132,252,.05)",filter:"blur(30px)",pointerEvents:"none"}}/>
      <div style={{fontFamily:"var(--mono)",fontSize:9,letterSpacing:".12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:14}}>{cap(mesLabel(mes))} · gastos fijos</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:18}}>
        {[{l:"Total",v:CLP(total),c:"rgba(255,255,255,.5)"},{l:"Pagado",v:CLP(pag),c:"var(--green)"},{l:"Pendiente",v:CLP(total-pag),c:total-pag>0?"var(--red)":"var(--green)"}].map(({l,v,c})=>
          <div key={l}><div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)",letterSpacing:".07em",textTransform:"uppercase",marginBottom:4}}>{l}</div><div style={{fontFamily:"var(--mono)",fontSize:18,color:c}}>{v}</div></div>
        )}
      </div>
      <div style={{height:2,background:"rgba(255,255,255,.06)",borderRadius:9999,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:"var(--green)",borderRadius:9999,transition:"width .7s cubic-bezier(.32,.72,0,1)"}}/>
      </div>
      <div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)",marginTop:7,textAlign:"right"}}>{pct}% pagado</div>
    </div>

    {ce.map(g=>{
      const pagado=g.pagado;
      const problema=g.vencida||g.deuda;
      const bc=pagado?"rgba(0,196,140,.15)":problema?"rgba(255,90,90,.12)":"var(--card)";
      const bdr=pagado?"rgba(0,196,140,.2)":problema?"rgba(255,90,90,.2)":"var(--border)";
      const fc=pagado?"var(--green)":problema?"var(--red)":"var(--ink)";
      return <div key={g.id} style={{background:bc,border:`1px solid ${bdr}`,borderRadius:14,padding:"14px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button className="chk" onClick={()=>setGfPago(g.id,mes,!pagado)}
            style={{border:`1.5px solid ${pagado?"var(--green)":"rgba(255,255,255,.15)"}`,background:pagado?"var(--green)":"transparent",color:"#000"}}>
            {pagado?"✓":""}
          </button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:14,color:fc,letterSpacing:"-.01em"}}>{g.nombre}</div>
            <div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap",alignItems:"center"}}>
              {g.dia&&<span style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--muted)"}}>día {g.dia}</span>}
              <Pill tone={g.freq==="mensual"?"gray":"purple"}>{g.freq}</Pill>
              {g.deuda&&!pagado&&<Pill tone="red">en deuda</Pill>}
              {g.vencida&&!g.deuda&&<Pill tone="amber">vencida</Pill>}
              {g.urgente&&<Pill tone="amber">vence pronto</Pill>}
              {g.nota&&<span style={{fontSize:10,color:"var(--muted)"}}>{g.nota}</span>}
            </div>
          </div>
          <div style={{fontFamily:"var(--mono)",fontSize:15,fontWeight:500,color:fc,flexShrink:0}}>{CLP(g.monto)}</div>
          <button className="del" onClick={()=>del(g.id)}>×</button>
        </div>
      </div>;
    })}

    {!sf&&<button className="add-btn" onClick={()=>setSf(true)}>+ Agregar gasto fijo</button>}
    {sf&&<div className="card" style={{borderRadius:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontFamily:"var(--mono)",fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)"}}>Nuevo gasto fijo</div>
        <button onClick={()=>setSf(false)} style={{border:"none",background:"transparent",fontSize:22,color:"var(--muted)",lineHeight:1}}>×</button>
      </div>
      <div style={{display:"grid",gap:10}}>
        <input className="inp" placeholder="Nombre" value={nombre} onChange={e=>setNombre(e.target.value)} autoFocus/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <input className="inp" inputMode="numeric" placeholder="Monto $" value={monto} onChange={e=>setMonto(e.target.value)} style={{fontFamily:"var(--mono)"}}/>
          <input className="inp" inputMode="numeric" placeholder="Día de cobro" value={dia} onChange={e=>setDia(e.target.value)}/>
        </div>
        <div style={{display:"flex",gap:6}}>
          {["mensual","semestral","anual"].map(f=><button key={f} className={`btn-g${freq===f?" on":""}`} onClick={()=>setFreq(f)} style={{flex:1}}>{f}</button>)}
        </div>
        <input className="inp" placeholder="Nota (opcional)" value={nota} onChange={e=>setNota(e.target.value)}/>
        <label style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"var(--muted)",cursor:"pointer"}}>
          <input type="checkbox" checked={deuda} onChange={e=>setDeuda(e.target.checked)} style={{width:16,height:16}}/>Marcar como deuda
        </label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button className="btn-w" onClick={add}>Agregar</button>
          <button className="btn-cancel" onClick={()=>setSf(false)}>Cancelar</button>
        </div>
      </div>
    </div>}
  </div>;
}

/* ══ DASHBOARD ══ */
function Dashboard({meses,ivaD,ivaC,ivaN,totFac,meta,setMes,proxV,ivaPend,anticJun,provJun,ivaJun,libreJun}){

        {proxV?<>

          <Stat label="IVA débito" value={CLP(ivaD(k))} color="var(--red)"/>
          <Stat label="IVA crédito" value={CLP(ivaC(k))} color="var(--green)" note={ivaC(k)>0?"prov.":"—"}/>

/* ══ FACTURAS ══ */
function Facturas({fac,setFac}){
  const[sf,setSf]=useState(false);
  const[fecha,setFecha]=useState(todayISO());
  const[cliente,setCliente]=useState("");
  const[numero,setNumero]=useState("");
  const[monto,setMonto]=useState("");
  const[modo,setModo]=useState("neto");
  const add=()=>{
    const v=Number(String(monto).replace(/[^\d]/g,""));
    if(!v||!cliente.trim())return;
    let neto,iva,bruto;
    if(modo==="neto"){neto=v;iva=Math.round(v*IVA);bruto=v+iva;}
    else{bruto=v;neto=Math.round(v/1.19);iva=bruto-neto;}
    setFac(a=>[{id:uid(),fecha,cliente:cliente.trim(),numero:numero.trim(),neto,iva,bruto},...a]);
    setCliente("");setNumero("");setMonto("");setSf(false);
  };
  const del=id=>{if(window.confirm("¿Eliminar?"))setFac(a=>a.filter(f=>f.id!==id));};
  const prev=useMemo(()=>{const v=Number(String(monto).replace(/[^\d]/g,""))||0;const neto=modo==="neto"?v:Math.round(v/1.19);const iva=Math.round(neto*IVA);return{neto,iva,bruto:neto+iva};},[monto,modo]);
  const grupos=useMemo(()=>{const g={};fac.forEach(f=>{const k=monthKey(f.fecha);(g[k]=g[k]||[]).push(f);});return Object.keys(g).sort().reverse().map(k=>[k,g[k]]);},[fac]);

  return <div style={{display:"grid",gap:12}}>
    {!sf&&<button className="btn-w" style={{borderRadius:12,padding:"14px"}} onClick={()=>setSf(true)}>+ Nueva factura</button>}
    {sf&&<div className="card" style={{borderRadius:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontFamily:"var(--mono)",fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)"}}>Nueva factura</div>
        <button onClick={()=>setSf(false)} style={{border:"none",background:"transparent",fontSize:22,color:"var(--muted)",lineHeight:1}}>×</button>
      </div>
      <div style={{display:"grid",gap:10}}>
        <input className="inp" placeholder="Cliente / concepto" value={cliente} onChange={e=>setCliente(e.target.value)} autoFocus/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <input className="inp" type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
          <input className="inp" placeholder="N° factura" value={numero} onChange={e=>setNumero(e.target.value)}/>
        </div>
        <div style={{display:"flex",gap:6}}>
          {[["neto","Neto"],["bruto","Total c/IVA"]].map(([id,l])=><button key={id} className={`btn-g${modo===id?" on":""}`} onClick={()=>setModo(id)} style={{flex:1}}>{l}</button>)}
        </div>
        <input className="inp" inputMode="numeric" placeholder={modo==="neto"?"Monto neto (sin IVA)":"Total con IVA"} value={monto} onChange={e=>setMonto(e.target.value)} style={{fontFamily:"var(--mono)"}}/>
        {monto&&<div style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--muted)",background:"rgba(255,255,255,.03)",padding:"10px 13px",borderRadius:9,lineHeight:1.7}}>
          Neto {CLP(prev.neto)}  ·  IVA {CLP(prev.iva)}  ·  Total {CLP(prev.bruto)}
        </div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button className="btn-w" onClick={add}>Agregar</button>
          <button className="btn-cancel" onClick={()=>setSf(false)}>Cancelar</button>
        </div>
      </div>
    </div>}
    {grupos.length===0&&!sf&&<div style={{textAlign:"center",color:"var(--muted)",fontSize:13,padding:"40px 0",background:"var(--card)",borderRadius:16,border:"1px solid var(--border)"}}>Sin facturas. Toca "+ Nueva factura".</div>}
    {grupos.map(([k,items])=><div key={k}>
      <div className="mh">
        <span style={{textTransform:"capitalize"}}>{mesLabel(k)}</span>
        <span style={{fontFamily:"var(--mono)",color:"var(--red)"}}>IVA {CLP(items.reduce((s,f)=>s+f.iva,0))}</span>
      </div>
      {items.map(f=>{
        const s30=addDays(f.fecha,30);
        return <div key={f.id} className="row" style={{alignItems:"flex-start"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:14,color:"var(--ink)",letterSpacing:"-.01em",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.cliente}</div>
            <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)",marginTop:3}}>{f.fecha}{f.numero?` · N°${f.numero}`:""}</div>
            <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap"}}>
              <span style={{fontFamily:"var(--mono)",fontSize:9,background:"var(--blue-bg)",color:"var(--blue)",padding:"2px 8px",borderRadius:9999}}>Anticipo: {CLP(Math.round(f.bruto*.5))}</span>
              <span style={{fontFamily:"var(--mono)",fontSize:9,background:"var(--green-bg)",color:"var(--green)",padding:"2px 8px",borderRadius:9999}}>Saldo {fmtDate(s30)}: {CLP(Math.round(f.bruto*.5))}</span>
            </div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:500,color:"var(--ink)"}}>{CLP(f.bruto)}</div>
            <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--red)",marginTop:2}}>IVA {CLP(f.iva)}</div>
          </div>
          <button className="del" onClick={()=>del(f.id)}>×</button>
        </div>;
      })}
    </div>)}
  </div>;
}

/* ══ CALENDARIO ══ */
function Calendario({fac,cob}){
  const todos=useMemo(()=>{
    const items=[];
    fac.forEach(f=>{
      const cobFac=cob.filter(c=>c.ref&&c.ref.toLowerCase().includes(f.cliente.split("—")[0].trim().toLowerCase()));
      const cobrado=cobFac.reduce((s,c)=>s+c.monto,0);
      items.push({fecha:parseLocal(f.fecha),label:`Anticipo 50% — ${f.cliente}`,monto:Math.round(f.bruto*.5),tipo:"anticipo",cobrado:cobrado>=f.bruto*.49});
      items.push({fecha:addDays(f.fecha,30),label:`Saldo final — ${f.cliente}`,monto:Math.round(f.bruto*.5),tipo:"final",cobrado:cobrado>=f.bruto*.99});
    });
    return items.sort((a,b)=>a.fecha-b.fecha);
  },[fac,cob]);
  return <div style={{display:"grid",gap:8}}>
    <div style={{fontFamily:"var(--mono)",fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)",marginBottom:4}}>Anticipo al facturar · saldo a 30 días</div>
    {todos.map((item,i)=>{
      const dias=diasHasta(item.fecha);const vencida=dias<0&&!item.cobrado;
      const bg=item.cobrado?"var(--green-bg)":vencida?"var(--red-bg)":"var(--card)";
      const bdr=item.cobrado?"rgba(0,196,140,.2)":vencida?"rgba(255,90,90,.2)":"var(--border)";
      const color=item.cobrado?"var(--green)":vencida?"var(--red)":"var(--ink)";
      return <div key={i} style={{display:"flex",alignItems:"center",gap:14,background:bg,border:`1px solid ${bdr}`,borderRadius:12,padding:"13px 15px"}}>
        <div style={{minWidth:58,textAlign:"center",flexShrink:0}}>
          <div style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--muted)"}}>{item.fecha.toLocaleDateString("es-CL",{day:"numeric",month:"short"})}</div>
          <div style={{fontFamily:"var(--mono)",fontSize:9,color:vencida?"var(--red)":"var(--muted)",marginTop:1}}>{item.cobrado?"recibido":dias<0?`${Math.abs(dias)}d atrás`:`en ${dias}d`}</div>
        </div>
        <div className="divider"/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.label}</div>
          <div style={{marginTop:4}}>{item.cobrado?<Pill tone="green">cobrado</Pill>:item.tipo==="anticipo"?<Pill tone="blue">anticipo 50%</Pill>:<Pill tone={vencida?"red":dias<=5?"amber":"gray"}>saldo final</Pill>}</div>
        </div>
        <div style={{fontFamily:"var(--mono)",fontSize:14,color,fontWeight:500,flexShrink:0}}>{CLP(item.monto)}</div>
      </div>;
    })}
  </div>;
}

    {grupos.map(([k,items])=><div key={k}>
      <div className="mh"><span style={{textTransform:"capitalize"}}>{mesLabel(k)}</span><span style={{fontFamily:"var(--mono)",color:"var(--green)"}}>Crédito {CLP(items.reduce((s,c)=>s+c.iva,0))}</span></div>
      {items.map(c=><div key={c.id} className="row">
        <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:"var(--ink)"}}>{c.proveedor}</div><div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)",marginTop:2}}>{c.fecha}</div></div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:500,color:"var(--ink)"}}>{CLP(c.bruto)}</div>
          <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--green)",marginTop:2}}>Crédito {CLP(c.iva)}</div>
        </div>
        <button className="del" onClick={()=>del(c.id)}>×</button>
      </div>)}
    </div>)}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
