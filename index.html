.sv{font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:-.01em;line-height:1;}
.chk{width:20px;height:20px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;}
.add-btn{border:1px dashed rgba(255,255,255,.15);background:transparent;border-radius:14px;padding:14px;font-size:13px;font-weight:600;color:var(--muted);width:100%;}
